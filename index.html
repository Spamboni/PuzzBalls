<!-- PuzzBalls v1683 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <title>PuzzBalls</title>
  <link rel="stylesheet" href="css/styles.css?v=1546">
  <link rel="manifest" href="manifest.json?v=1546">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/PuzzBalls/sw.js').catch(function(){});
    }
  </script>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="theme-color" content="#030A18">
</head>
<body>

<!-- ══════════ MAIN MENU ══════════ -->
<div id="menu-screen"></div>

<!-- ══════════ GAME SCREEN ══════════ -->
<div id="game-screen" style="display:none">

  <canvas id="canvas"></canvas>

  <!-- HUD overlay -->
  <div id="hud-overlay">
    <div id="hud-left">
      <button id="btn-back" title="Menu">◀</button>
      <div id="level-title">PUZZBALLS</div>
    </div>
    <div id="hud-right">
      <button id="btn-save-level" title="Save Level">💾 SAVE</button>
      <button id="btn-load-level" title="Load Level">📂 LOAD</button>
      <button id="btn-settings" title="Settings">⚙</button>
    </div>
  </div>

  <!-- Objectives panel -->
  <div id="objectives-panel"></div>

  <!-- Settings panel (built dynamically) -->
  <div id="settings-panel"></div>

  <!-- Win overlay -->
  <div id="message-overlay">
    <div id="message-title"></div>
    <div id="message-sub"></div>
  </div>

</div><!-- /#game-screen -->

<script src="js/sound.js?v=1683"></script>
<script src="js/physics.js?v=1683"></script>
<script src="js/objects.js?v=1683"></script>
<script src="js/tubes.js?v=1683"></script>
<script src="js/events.js?v=1683"></script>
<script src="js/balls.js?v=1683"></script>
<script src="js/presets.js?v=1683"></script>
<script src="js/menu.js?v=1683"></script>
<script src="js/ui.js?v=1683"></script>
<script src="js/game.js?v=1683"></script>

<script>
window.addEventListener('DOMContentLoaded', function() {
  document.body.addEventListener('touchstart', function unlock() {
    if (window.Sound) Sound.getCtx();
    document.body.removeEventListener('touchstart', unlock);
  }, { once: true });

  var menuScreen = document.getElementById('menu-screen');
  var gameScreen = document.getElementById('game-screen');
  var canvas     = document.getElementById('canvas');
  var game       = null;

  function showMenu() {
    if (game) { game.stop(); game = null; }
    gameScreen.style.display = 'none';
    menuScreen.style.display = 'flex';
  }

  function playLevel(levelId, presetId) {
    // Apply chosen preset
    var preset = Presets.getById(presetId);
    Presets.applyPreset(preset);

    // Level definitions
    var levels = {
      'test_level': {
        id: 'test_level',
        name: 'Test Level',
        balls: [],
        obstacles: [],
        objects: [],   // no default bricks — use brick editor to place
        target: { rx: 0.15, ry: 0.10, r: 1, barrierR: 1, barrierThickness: 0, barrierGap: Math.PI, barrierGapAngle: 0 },
        objectives: [],
      },

      'level_2_buttons': {
        id: 'level_2_buttons',
        name: 'Button Challenge',
        balls: [
          { type: 'bouncer', count: 3 },
        ],
        obstacles: [
          { rx: 0.35, ry: 0.45, shape: 'triangle', size: 24 },
          { rx: 0.65, ry: 0.45, shape: 'triangle', size: 24 },
        ],
        objects: [
          {
            id: 'btn_main',
            type: 'button',
            rx: 0.25, ry: 0.70,
            r: 20,
            triggers: [
              { actionType: 'open_door', targetId: 'barrier_main', duration: 4000 }
            ]
          },
        ],
        target: {
          rx: 0.50, ry: 0.10, r: 30,
          barrierR: 70, barrierThickness: 13,
          barrierGap: 0.15, barrierGapAngle: -Math.PI / 2,
        },
        objectives: [
          { id: 'goal_1', type: 'ballInZone', ballType: 'bouncer', description: 'Hit the BUTTON to open the gate, then land a BOUNCER' }
        ],
      },

      'level_3_bricks': {
        id: 'level_3_bricks',
        name: 'Brick Breaker',
        balls: [
          { type: 'bouncer', count: 2 },
          { type: 'exploder', count: 2 },
        ],
        obstacles: [
          { rx: 0.50, ry: 0.35, shape: 'hexagon', size: 22 },
        ],
        objects: [
          { id: 'brick_a', type: 'breakable_brick', rx: 0.30, ry: 0.55, w: 44, h: 55, health: 3,
            triggers: [ { actionType: 'open_door', targetId: 'barrier_main', duration: 6000 } ] },
          { id: 'brick_b', type: 'breakable_brick', rx: 0.70, ry: 0.55, w: 44, h: 55, health: 3,
            triggers: [ { actionType: 'open_door', targetId: 'barrier_main', duration: 6000 } ] },
        ],
        target: {
          rx: 0.50, ry: 0.10, r: 30,
          barrierR: 70, barrierThickness: 13,
          barrierGap: 0.15, barrierGapAngle: -Math.PI / 2,
        },
        objectives: [
          { id: 'goal_1', type: 'brickDestroyed', brickId: 'brick_a', description: 'Destroy the LEFT brick' },
          { id: 'goal_2', type: 'brickDestroyed', brickId: 'brick_b', description: 'Destroy the RIGHT brick' },
          { id: 'goal_3', type: 'ballInZone',     ballType: 'bouncer', description: 'Land a BOUNCER in the target' },
        ],
      },

      'level_4_turnstile': {
        id: 'level_4_turnstile',
        name: 'Turnstile Gauntlet',
        balls: [
          { type: 'bouncer', count: 3 },
          { type: 'sticky',  count: 1 },
        ],
        obstacles: [],
        objects: [
          { id: 'spin_a', type: 'turnstile', rx: 0.30, ry: 0.38, r: 48, rotationSpeed: 120 },
          { id: 'spin_b', type: 'turnstile', rx: 0.70, ry: 0.55, r: 48, rotationSpeed: -180 },
          { id: 'spin_c', type: 'turnstile', rx: 0.50, ry: 0.28, r: 36, rotationSpeed: 240 },
        ],
        target: {
          rx: 0.50, ry: 0.10, r: 30,
          barrierR: 70, barrierThickness: 13,
          barrierGap: Math.PI * 0.26, barrierGapAngle: -Math.PI / 2,
        },
        objectives: [
          { id: 'goal_1', type: 'ballInZone', ballType: 'bouncer', description: 'Navigate through the spinning turnstiles' },
        ],
      },

      'level_5_port': {
        id: 'level_5_port',
        name: 'Power the Grid',
        balls: [
          { type: 'bouncer', count: 2 },
          { type: 'gravity', count: 1 },
          { type: 'splitter', count: 1 },
        ],
        obstacles: [
          { rx: 0.50, ry: 0.50, shape: 'square', size: 26 },
        ],
        objects: [
          {
            id: 'port_alpha',
            type: 'electrical_port',
            rx: 0.25, ry: 0.25,
            r: 22,
            requiredBallType: 'gravity',
            triggers: [
              { actionType: 'open_door', targetId: 'barrier_main', duration: 99999 }
            ]
          },
          { id: 'spin_guard', type: 'turnstile', rx: 0.50, ry: 0.40, r: 42, rotationSpeed: 150 },
        ],
        target: {
          rx: 0.50, ry: 0.10, r: 30,
          barrierR: 70, barrierThickness: 13,
          barrierGap: 0.15, barrierGapAngle: -Math.PI / 2,
        },
        objectives: [
          { id: 'goal_1', type: 'portActivated', portId: 'port_alpha', description: 'Plug the GRAVITY ball into the port ⚡' },
          { id: 'goal_2', type: 'ballInZone',    ballType: 'bouncer',  description: 'Then land a BOUNCER in the target' },
        ],
      },
    };

    var levelData = levels[levelId];

    // Check custom levels in localStorage if not found in built-ins
    if (!levelData) {
      try {
        var customLevels = JSON.parse(localStorage.getItem('puzzballs_custom_levels') || '[]');
        levelData = customLevels.find(function(l) { return l.id === levelId; });
      } catch(e) {}
    }
    if (!levelData) levelData = levels['test_level'];

    menuScreen.style.display = 'none';
    gameScreen.style.display = 'block';

    try {
      game = new Game(canvas, showMenu); window._gameRef = game;
      game.loadLevel(levelData);
    } catch(err) {
      console.error('PuzzBalls startup crash:', err);
      var ctx2 = canvas.getContext('2d');
      var W2 = canvas.width || window.innerWidth;
      var H2 = canvas.height || window.innerHeight;
      canvas.width = W2; canvas.height = H2;
      ctx2.fillStyle = '#030a18'; ctx2.fillRect(0,0,W2,H2);
      ctx2.fillStyle = '#ff4444'; ctx2.font = "bold 13px 'Share Tech Mono',monospace";
      ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
      ctx2.fillText('STARTUP ERROR:', W2/2, H2/2 - 50);
      ctx2.fillStyle = '#ff8888'; ctx2.font = "11px 'Share Tech Mono',monospace";
      var msg = (err.message || String(err)).slice(0, 120);
      ctx2.fillText(msg.slice(0,55), W2/2, H2/2 - 20);
      if (msg.length > 55) ctx2.fillText(msg.slice(55), W2/2, H2/2);
      ctx2.fillStyle = '#ffaa44'; ctx2.font = "9px 'Share Tech Mono',monospace";
      var st = err.stack ? err.stack.split('\n').slice(1,3).join(' | ') : '';
      ctx2.fillText(st.slice(0,70), W2/2, H2/2 + 30);
      ctx2.fillStyle = '#44aaff';
      ctx2.fillText('Tap ◀ to go back', W2/2, H2/2 + 60);
    }
  }

  Menu.init(menuScreen, playLevel);
  showMenu();
});
</script>
</body>
</html>
