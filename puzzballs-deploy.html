<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

  :root {
    --cyan: #00e5ff;
    --green: #00ff88;
    --orange: #ff8800;
    --red: #ff3060;
    --bg: #030a18;
    --panel: rgba(0,20,50,0.85);
    --border: rgba(0,200,255,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #cde;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    overflow-x: hidden;
  }

  /* Starfield */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 15%, rgba(0,200,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 30%, rgba(0,200,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 60%, rgba(0,200,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 70%, rgba(0,200,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(0,200,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 85%, rgba(0,200,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 90% 20%, rgba(255,136,0,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 30% 45%, rgba(255,136,0,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .logo-wrap {
    position: relative; z-index: 1;
    margin-bottom: 4px;
  }
  #logoCanvas {
    width: 300px; height: 110px;
    display: block;
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,200,255,0.45);
    text-transform: uppercase;
    margin-bottom: 24px;
    position: relative; z-index: 1;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    position: relative; z-index: 1;
    backdrop-filter: blur(10px);
    margin-bottom: 14px;
  }

  .card-title {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,200,255,0.5);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  label {
    display: block;
    font-size: 10px;
    color: rgba(0,200,255,0.6);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: rgba(0,10,30,0.8);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 14px;
  }
  input:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,229,255,0.2); }

  .token-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .token-row input { flex: 1; margin-bottom: 0; }
  .eye-btn {
    background: rgba(0,20,50,0.8);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: rgba(0,200,255,0.5);
    font-size: 16px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    margin-top: 0;
  }
  .eye-btn:active { background: rgba(0,100,200,0.2); }

  .drop-zone {
    border: 2px dashed rgba(0,200,255,0.3);
    border-radius: 10px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .drop-zone.has-file {
    border-color: var(--green);
    background: rgba(0,255,136,0.05);
  }
  .drop-zone.dragging {
    border-color: var(--cyan);
    background: rgba(0,229,255,0.08);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }
  .drop-icon { font-size: 32px; margin-bottom: 8px; }

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let zipFile = null;
let deploying = false;

function drawLogo() {
  var c = document.getElementById('logoCanvas');
  if (!c) return;
  var ctx = c.getContext('2d');
  var W = c.width, H = c.height;
  ctx.clearRect(0, 0, W, H);

  var t = 0;
  function frame() {
    t += 0.018;
    ctx.clearRect(0, 0, W, H);

    // ── Animated balls orbiting the title ──────────────────────────────
    var balls = [
      { col:'#4488ff', r:7,  ox:22, oy:54, speed:1.2, phase:0 },
      { col:'#ff4400', r:6,  ox:W-22, oy:54, speed:0.9, phase:2.1 },
      { col:'#44ff44', r:5,  ox:W/2,  oy:14, speed:1.5, phase:1.0 },
      { col:'#ff44ff', r:5,  ox:W/2,  oy:94, speed:1.1, phase:3.5 },
      { col:'#00ffee', r:4,  ox:60,   oy:90, speed:1.7, phase:0.7 },
    ];

    // Glow halos behind balls
    balls.forEach(function(b) {
      var bx = b.ox + Math.cos(t * b.speed + b.phase) * 8;
      var by = b.oy + Math.sin(t * b.speed + b.phase) * 6;
      var g = ctx.createRadialGradient(bx, by, 0, bx, by, b.r * 3.5);
      g.addColorStop(0, b.col + '55');
      g.addColorStop(1, 'transparent');
      ctx.beginPath(); ctx.arc(bx, by, b.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = g; ctx.fill();
    });

    // ── PUZZBALLS text ─────────────────────────────────────────────────
    ctx.save();
    ctx.font = "900 34px 'Orbitron', sans-serif";
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Outer glow layers
    var pulse = 0.7 + 0.3 * Math.sin(t * 0.8);
    ctx.shadowColor = '#00e5ff';
    ctx.shadowBlur = 18 * pulse;
    ctx.fillStyle = 'rgba(0,229,255,' + (0.15 * pulse) + ')';
    ctx.fillText('PUZZBALLS', W/2 + 2, H/2 + 2);

    ctx.shadowBlur = 10;
    ctx.fillStyle = '#00e5ff';
    ctx.fillText('PUZZBALLS', W/2, H/2);

    // Scanline shimmer
    var shimX = ((t * 60) % (W + 80)) - 40;
    var shimGrad = ctx.createLinearGradient(shimX - 30, 0, shimX + 30, 0);
    shimGrad.addColorStop(0, 'transparent');
    shimGrad.addColorStop(0.5, 'rgba(255,255,255,0.18)');
    shimGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = shimGrad;
    ctx.shadowBlur = 0;
    ctx.fillText('PUZZBALLS', W/2, H/2);
    ctx.restore();

    // ── Deploy rocket icon ─────────────────────────────────────────────
    // Small neon rocket in upper-right corner
    var rx = W - 28, ry = 18;
    var rBob = Math.sin(t * 2) * 2;
    ctx.save();
    ctx.translate(rx, ry + rBob);
    ctx.rotate(-0.4);
    // Flame
    var flameGrad = ctx.createRadialGradient(0, 10, 0, 0, 10, 10);
    flameGrad.addColorStop(0, '#ffcc00');
    flameGrad.addColorStop(0.5, '#ff6600aa');
    flameGrad.addColorStop(1, 'transparent');
    ctx.beginPath(); ctx.ellipse(0, 12, 4, 8, 0, 0, Math.PI * 2);
    ctx.fillStyle = flameGrad; ctx.fill();
    // Body
    ctx.beginPath();
    ctx.moveTo(0, -14); ctx.lineTo(6, 4); ctx.lineTo(-6, 4); ctx.closePath();
    ctx.fillStyle = '#00e5ff';
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 8;
    ctx.fill();
    // Window
    ctx.beginPath(); ctx.arc(0, -4, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff88'; ctx.shadowBlur = 0; ctx.fill();
    ctx.restore();

    // ── Balls (drawn on top) ───────────────────────────────────────────
    balls.forEach(function(b) {
      var bx = b.ox + Math.cos(t * b.speed + b.phase) * 8;
      var by = b.oy + Math.sin(t * b.speed + b.phase) * 6;
      var g2 = ctx.createRadialGradient(bx - b.r*0.3, by - b.r*0.3, 0, bx, by, b.r);
      g2.addColorStop(0, '#ffffff');
      g2.addColorStop(0.3, b.col);
      g2.addColorStop(1, b.col + '88');
      ctx.beginPath(); ctx.arc(bx, by, b.r, 0, Math.PI * 2);
      ctx.shadowColor = b.col; ctx.shadowBlur = 10;
      ctx.fillStyle = g2; ctx.fill();
      ctx.shadowBlur = 0;
      // Specular dot
      ctx.beginPath(); ctx.arc(bx - b.r*0.3, by - b.r*0.35, b.r*0.25, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();
    });

    requestAnimationFrame(frame);
  }
  frame();
}

// Load saved token and repo
window.onload = function() {
  drawLogo();
  var saved = localStorage.getItem('pb_token');
  if (saved) {
    document.getElementById('tokenInput').value = saved;
    document.getElementById('savedHint').style.display = 'block';
  }

};

}

function updateRepoDisplay() {

  var d = document.getElementById('repoDisplay');

    d.style.display = 'block';

}

document.getElementById('tokenInput').addEventListener('input', function() {
  localStorage.setItem('pb_token', this.value.trim());
  document.getElementById('savedHint').style.display = this.value ? 'block' : 'none';
  checkReady();
});
document.getElementById('repoInput').addEventListener('input', function() {
  localStorage.setItem('pb_repo', this.value.trim());
  updateRepoDisplay();
  checkReady();
});

// Drag and drop
var dz = document.getElementById('dropZone');
dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.classList.add('dragging'); });
dz.addEventListener('dragleave', function() { dz.classList.remove('dragging'); });
dz.addEventListener('drop', function(e) {
  e.preventDefault(); dz.classList.remove('dragging');
  var f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.zip')) setFile(f);
});

function onFileSelect(input) {
  if (input.files[0]) setFile(input.files[0]);
}

function setFile(f) {
  zipFile = f;
  dz.classList.add('has-file');
  document.querySelector('.drop-icon').textContent = '✅';
  document.querySelector('.drop-label').textContent = 'Zip file selected';
  document.getElementById('fileName').textContent = f.name + ' (' + (f.size/1024).toFixed(0) + ' KB)';
  checkReady();
}

function checkReady() {
  var token = document.getElementById('tokenInput').value.trim();
  var repo  = document.getElementById('repoInput').value.trim();
  document.getElementById('deployBtn').disabled = !(token && repo && zipFile && !deploying);
}

function log(msg, type) {
  var el = document.getElementById('log');
  el.classList.add('visible');
  var line = document.createElement('div');
  line.className = 'log-line log-' + (type||'info');
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setStatus(text, type) {
  var b = document.getElementById('statusBadge');
  b.className = 'status-badge visible ' + type;
  b.innerHTML = text;
}

function setProgress(pct) {
  document.getElementById('progressBar').classList.add('visible');
  document.getElementById('progressFill').style.width = pct + '%';
}

async function getFileSHA(token, repo, branch, path) {
  var r = await fetch('https://api.github.com/repos/' + repo + '/contents/' + path + '?ref=' + branch, {
    headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (r.status === 404) return null;
  if (!r.ok) return undefined;
  var j = await r.json();
  return j.sha || null;
}

// Compute Git blob SHA (sha1 of "blob <size>\0<content>")
// This matches what GitHub stores, so we can skip unchanged files
async function computeGitBlobSHA(arrayBuffer) {
  var bytes = new Uint8Array(arrayBuffer);
  var header = 'blob ' + bytes.length + '\0';
  var headerBytes = new TextEncoder().encode(header);
  var combined = new Uint8Array(headerBytes.length + bytes.length);
  combined.set(headerBytes, 0);
  combined.set(bytes, headerBytes.length);
  var hashBuffer = await crypto.subtle.digest('SHA-1', combined);
  var hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(function(b) { return b.toString(16).padStart(2,'0'); }).join('');
}

async function pushFile(token, repo, branch, path, content, sha, commitMsg) {
  var body = {
    message: commitMsg,
    content: content,  // base64
    branch: branch,
  };
  if (sha) body.sha = sha;
  var r = await fetch('https://api.github.com/repos/' + repo + '/contents/' + path, {
    method: 'PUT',
    headers: {
      'Authorization': 'token ' + token,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: JSON.stringify(body)
  });
  return r.ok;
}

function arrayBufferToBase64(buffer) {
  var bytes = new Uint8Array(buffer);
  var b = '';
  for (var i = 0; i < bytes.byteLength; i++) b += String.fromCharCode(bytes[i]);
  return btoa(b);
}

async function deploy() {
  if (deploying) return;
  deploying = true;
  checkReady();

  var token  = document.getElementById('tokenInput').value.trim();
  var repo   = document.getElementById('repoInput').value.trim();
  var branch = document.getElementById('branchInput').value.trim() || 'main';

  // Clear log
  document.getElementById('log').innerHTML = '';
  document.getElementById('statsRow').classList.remove('visible');
  setStatus('<span class="dot-pulse">●</span> Reading zip...', 'working');
  setProgress(2);

  var pushed = 0, skipped = 0, errors = 0;

  try {
    // Validate file before attempting to parse
    if (zipFile.size < 10000) {
      throw new Error('File too small (' + zipFile.size + ' bytes) — download may be corrupted. Try re-downloading the zip from Claude.');
    }
    var headerBytes = await new Promise(function(res, rej) {
      var r = new FileReader(); r.onload = function(e) { res(new Uint8Array(e.target.result)); }; r.onerror = rej;
      r.readAsArrayBuffer(zipFile.slice(0, 4));
    });
    if (headerBytes[0] !== 0x50 || headerBytes[1] !== 0x4B) {
      throw new Error('Not a valid zip file — wrong file header. The download may have been truncated. Please re-download the zip from Claude and try again.');
    }
    // Read zip
    var zip = await JSZip.loadAsync(zipFile);
    var files = [];
    zip.forEach(function(path, entry) {
      if (!entry.dir) files.push({ path: path, entry: entry });
    });

    // Strip leading folder name (e.g. "puzzballs/")
    var prefix = '';
    if (files.length > 0) {
      var firstPath = files[0].path;
      var slash = firstPath.indexOf('/');
      if (slash > 0) prefix = firstPath.slice(0, slash + 1);
    }

    // Filter to only deployable files (skip icons unless changed)
    var deployFiles = files.filter(function(f) {
      var p = f.path;
      // Skip .DS_Store, __MACOSX etc
      if (p.includes('__MACOSX') || p.includes('.DS_Store')) return false;
      return true;
    });

    log('📦 Found ' + deployFiles.length + ' files in zip', 'info');
    log('🌿 Deploying to ' + repo + ' @ ' + branch, 'info');

    var commitMsg = 'Deploy ' + zipFile.name.replace('.zip','') + ' via PuzzBalls Deploy Tool';

    for (var i = 0; i < deployFiles.length; i++) {
      var f = deployFiles[i];
      // Strip prefix to get repo-relative path
      var repoPath = prefix ? f.path.slice(prefix.length) : f.path;
      if (!repoPath) continue;

      setProgress(5 + Math.round((i / deployFiles.length) * 88));
      setStatus('<span class="dot-pulse">●</span> ' + (i+1) + '/' + deployFiles.length + ': ' + repoPath.split('/').pop(), 'working');

      try {
        // Get file content as ArrayBuffer
        var buf = await f.entry.async('arraybuffer');
        var b64 = arrayBufferToBase64(buf);

        // Get current SHA from GitHub
        var remoteSHA = await getFileSHA(token, repo, branch, repoPath);

        // Compute local Git blob SHA and compare — skip if identical
        if (remoteSHA) {
          var localSHA = await computeGitBlobSHA(buf);
          if (localSHA === remoteSHA) {
            skipped++;
            log('  = ' + repoPath + ' (unchanged)', 'dim');
            continue;
          }
        }

        var ok = await pushFile(token, repo, branch, repoPath, b64, remoteSHA, commitMsg);
        if (ok) {
          pushed++;
          log('  ✓ ' + repoPath, 'ok');
        } else {
          errors++;
          log('  ✗ ' + repoPath + ' — push failed', 'err');
        }
      } catch(e) {
        errors++;
        log('  ✗ ' + repoPath + ' — ' + e.message, 'err');
      }

      // Small delay to avoid rate limiting
      await new Promise(function(r) { setTimeout(r, 120); });
    }

    setProgress(100);
    document.getElementById('statPushed').textContent = pushed;
    document.getElementById('statSkipped').textContent = skipped;
    document.getElementById('statErrors').textContent = errors;
    document.getElementById('statsRow').classList.add('visible');

    if (errors === 0) {
      setStatus('✅ Deploy complete! ' + pushed + ' files pushed', 'success');
      log('', 'dim');
      log('🚀 Files pushed! Waiting for GitHub Pages to rebuild...', 'ok');
      pollPagesDeployment(token, repo);
    } else {
      setStatus('⚠ Done with ' + errors + ' errors', 'error');
      log('Check errors above. Try re-deploying — GitHub sometimes rate-limits.', 'warn');
    }

  } catch(e) {
    setStatus('❌ Error: ' + e.message, 'error');
    log('Fatal error: ' + e.message, 'err');
  }

  deploying = false;
  checkReady();
}

async function pollPagesDeployment(token, repo) {
  var card    = document.getElementById('pagesCard');
  var badge   = document.getElementById('pagesBadge');
  var bar     = document.getElementById('pagesProgress');
  var elapsed = document.getElementById('pagesElapsed');
  var link    = document.getElementById('siteLink');
  var siteUrl = 'https://' + repo.split('/')[0].toLowerCase() + '.github.io/' + repo.split('/')[1];

  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  link.href = siteUrl + '?v=' + Date.now();

  var startTime = Date.now();
  var maxWait   = 40000;  // 40 seconds max
  var pollInterval = 4000; // check every 4 seconds
  var lastDeployId = null;
  var playShown = false;

  function tick() {
    var ms = Date.now() - startTime;
    var sec = Math.floor(ms / 1000);
    elapsed.textContent = sec + 's';
    // Animate bar 0→100% over 40s
    var pct = Math.min(99, (ms / 40000) * 100);
    bar.style.width = pct + '%';
    // Show play button after 40 seconds regardless
    if (ms >= 40000 && !playShown) {
      playShown = true;
      link.style.display = 'inline-block';
      badge.className = 'status-badge visible success';
      badge.innerHTML = '✅ Ready! (~' + sec + 's)';
      log('🌐 Site live at: ' + siteUrl, 'ok');
    }
  }

  var tickInterval = setInterval(tick, 500);

  async function checkStatus() {
    try {
      // First try the Pages deployments API (newer, more accurate)
      var r = await fetch('https://api.github.com/repos/' + repo + '/pages/deployments?per_page=1', {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
      });

      if (r.ok) {
        var deploys = await r.json();
        if (deploys && deploys.length > 0) {
          var d = deploys[0];
          var state = d.status_url ? 'pending' : 'unknown';

          // Check the status URL if available
          if (d.status_url) {
            var sr = await fetch(d.status_url, {
              headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
            });
            if (sr.ok) {
              var sd = await sr.json();
              state = sd.status || state;
            }
          }

          if (state === 'succeed' || state === 'deployment_success') {
            done(true);
            return;
          }
          if (state === 'deployment_failed' || state === 'error') {
            done(false);
            return;
          }
        }
      }

      // Fallback: check the Pages API for last build time
      var r2 = await fetch('https://api.github.com/repos/' + repo + '/pages', {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (r2.ok) {
        var pg = await r2.json();
        var builtAt = pg.built_at ? new Date(pg.built_at).getTime() : 0;
        if (builtAt > startTime - 5000) {
          // Pages was built after we started deploying
          done(true);
          return;
        }
        badge.className = 'status-badge visible working';
        var statusText = pg.status || 'building';
        badge.innerHTML = '<span class="dot-pulse">●</span> GitHub Pages: ' + statusText + '...';
      }

    } catch(e) {
      badge.className = 'status-badge visible working';
      badge.innerHTML = '<span class="dot-pulse">●</span> Checking...';
    }

    // Keep polling if not done and within time limit
    if (Date.now() - startTime < maxWait) {
      setTimeout(checkStatus, pollInterval);
    } else {
      done(true, true);
    }
  }

  function done(success, timedOut) {
    clearInterval(tickInterval);
    bar.style.transition = 'width 0.5s ease';
    bar.style.width = '100%';

    var ms = Date.now() - startTime;
    var sec = Math.floor(ms / 1000);
    elapsed.textContent = sec + 's';

    if (success) {
      badge.className = 'status-badge visible success';
      badge.innerHTML = timedOut
        ? '✅ Live! (~' + sec + 's)'
        : '✅ Live in ' + sec + 's!';
      link.style.display = 'inline-block';
      playShown = true;
      log('🌐 Site live at: ' + siteUrl, 'ok');
    } else {
      badge.className = 'status-badge visible error';
      badge.innerHTML = '❌ Deploy failed — check GitHub Actions';
    }
  }

  // Start polling after a short initial delay
  setTimeout(checkStatus, 3000);
}
</script>
